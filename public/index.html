<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Загрузка файла</title>
<style>
  body { font-family: sans-serif; max-width: 500px; margin: 60px auto; }
  code { background: #eee; padding: 4px 6px; border-radius: 4px; display: inline-block; margin-top: 6px; word-break: break-all; }
</style>
</head>
<body>
  <h2>Загрузи файл — получи ссылку и команду</h2>
  <form id="form">
    <input type="file" id="fileInput" required>
    <button type="submit">Загрузить</button>
  </form>
  <div id="result"></div>

  <script>
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const file = document.getElementById('fileInput').files[0];
      const data = new FormData();
      data.append('file', file);

      const res = await fetch('/upload', { method: 'POST', body: data });
      const json = await res.json();

      document.getElementById('result').innerHTML = `
        <p>Ссылка: <a href="${json.link}">${json.link}</a></p>
        <p>Команда для второго ПК (PowerShell) — скачает файл сразу на Рабочий стол:</p>
        <code>cd $env:USERPROFILE\\Desktop; Invoke-WebRequest -Uri ${json.link} -OutFile "${json.name}"</code>
        <p>Команда для второго ПК (curl) — тоже на Рабочий стол:</p>
        <code>cd $env:USERPROFILE\\Desktop; curl.exe -L -o "${json.name}" ${json.link}</code>
      `;
    });
  </script>
</body>
</html>
